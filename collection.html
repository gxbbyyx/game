<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Collection</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .collection-page {
      min-height: 100vh;
      padding: 24px;
    }

    .collection-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .collection-title {
      margin: 0;
    }

    .collection-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .owned-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .owned-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(8px);
      width: 100%;
      height: auto;
      padding: 4px;
    }

    .owned-media {
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      border-radius: 18px;
    }

    .owned-media img,
    .owned-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .owned-info {
      padding: 14px;
    }

    .owned-name {
      font-weight: bold;
      font-size: 1rem;
      margin-bottom: 6px;
      color: #FFFFFF;
    }

    .owned-rarity {
      font-size: 0.9rem;
      margin-bottom: 4px;
      color: #FFFFFF;
    }

    .owned-odds {
      font-size: 0.8rem;
      opacity: 0.8;
      color: #FFFFFF;
      margin-bottom: 12px;
    }

    .card-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-buttons button {
      flex: 1;
      min-width: 90px;
    }

    .empty-collection {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.8;
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
    }
  </style>
</head>
<body>
  <div class="collection-page">
    <div class="collection-header">
      <div>
        <h1 class="collection-title">My Collection</h1>
        <div id="collectionCount">Owned: 0</div>
      </div>

      <div class="collection-actions">
        <a href="game.html"><button type="button">Back to Game</button></a>
      </div>
    </div>

    <div style="margin-bottom: 28px;">
      <h2 style="margin-bottom: 12px;">Favorites</h2>
      <div id="favoritesGrid" class="owned-grid"></div>
    </div>

    <div>
      <h2 style="margin-bottom: 12px;">All Owned Cards</h2>
      <div id="ownedGrid" class="owned-grid"></div>
    </div>
  </div>

<script>
  const SAVE_KEY = "rng_web_game_save_v4";

  function formatOdds(odds) {
    return `1 in ${odds.toLocaleString()}`;
  }

  function getRarity(character) {
    const odds = character.odds;

    if (odds <= 50) return "mortal";
    if (odds <= 150) return "blessed";
    if (odds <= 4000) return "astral";
    if (odds <= 10000) return "ascended";
    if (odds <= 30000) return "mythic";
    if (odds <= 100000) return "divine";
    if (odds <= 200000) return "ethereal";
    if (odds <= 300000) return "celestial";
    if (odds <= 500000) return "transcendant";
    if (odds <= 650000) return "primordial";
    if (odds <= 750000) return "cosmic";
    return "eclipse";
  }

  function capitalize(text) {
    return text.charAt(0).toUpperCase() + text.slice(1);
  }

  function isVideoFile(path) {
    return /\.(mp4|webm|ogg)$/i.test(path);
  }

  function getCardId(card) {
    return `${card.name}__${card.odds}__${card.image}`;
  }

  function toggleFavorite(cardToToggle) {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;

    let data;

    try {
      data = JSON.parse(raw);
    } catch {
      return;
    }

    if (!Array.isArray(data.favoriteCards)) {
      data.favoriteCards = [];
    }

    if (!Array.isArray(data.keptCards)) {
      data.keptCards = [];
    }

    const targetId = getCardId(cardToToggle);
    const stillOwned = data.keptCards.some((card) => getCardId(card) === targetId);

    if (!stillOwned) return;

    if (data.favoriteCards.includes(targetId)) {
      data.favoriteCards = data.favoriteCards.filter((id) => id !== targetId);
    } else {
      data.favoriteCards.push(targetId);
    }

    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    renderCollection();
  }

  function deleteCard(cardToDelete) {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;

    if (!confirm(`Delete ${cardToDelete.name} from your collection?`)) {
      return;
    }

    let data;

    try {
      data = JSON.parse(raw);
    } catch {
      return;
    }

    const targetId = getCardId(cardToDelete);

    data.keptCards = Array.isArray(data.keptCards)
      ? data.keptCards.filter((card) => getCardId(card) !== targetId)
      : [];

    if (Array.isArray(data.favoriteCards)) {
      data.favoriteCards = data.favoriteCards.filter((id) => id !== targetId);
    }

    if (Array.isArray(data.discoveredCards)) {
      data.discoveredCards = data.discoveredCards.filter((id) => id !== targetId);
    }

    if (Array.isArray(data.rollHistory)) {
      data.rollHistory = data.rollHistory.filter((card) => getCardId(card) !== targetId);
    }

    if (data.currentRoll && getCardId(data.currentRoll) === targetId) {
      data.currentRoll = null;
    }

    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    renderCollection();
  }

  function createCardElement(card, isFavoritedCard = false) {
    const rarity = getRarity(card);
    const wrapper = document.createElement("div");
    wrapper.className = `owned-card card-shell rarity-${rarity} ${rarity}-border`;

    const media = isVideoFile(card.image)
      ? `<video src="${card.image}" autoplay muted loop playsinline></video>`
      : `<img src="${card.image}" alt="${card.name}">`;

    wrapper.innerHTML = `
      <div class="owned-media">${media}</div>
      <div class="owned-info">
        <div class="owned-name">${isFavoritedCard ? "★ " : ""}${card.name}</div>
        <div class="owned-rarity ${"rarity-" + rarity}">${capitalize(rarity)}</div>
        <div class="owned-odds">${formatOdds(card.odds)}</div>
        <div class="card-buttons">
          <button class="favorite-btn" type="button">${isFavoritedCard ? "Unfavorite" : "Favorite"}</button>
          <button class="danger delete-btn" type="button">Delete</button>
        </div>
      </div>
    `;

    wrapper.querySelector(".favorite-btn").addEventListener("click", () => {
      toggleFavorite(card);
    });

    wrapper.querySelector(".delete-btn").addEventListener("click", () => {
      deleteCard(card);
    });

    return wrapper;
  }

  function renderCollection() {
    const raw = localStorage.getItem(SAVE_KEY);
    const ownedGrid = document.getElementById("ownedGrid");
    const favoritesGrid = document.getElementById("favoritesGrid");
    const collectionCount = document.getElementById("collectionCount");

    if (!raw) {
      collectionCount.textContent = "Owned: 0";
      favoritesGrid.innerHTML = `<div class="empty-collection">No favorite cards yet.</div>`;
      ownedGrid.innerHTML = `<div class="empty-collection">No owned cards yet.</div>`;
      return;
    }

    let keptCards = [];
    let favoriteCards = [];

    try {
      const data = JSON.parse(raw);
      keptCards = Array.isArray(data.keptCards) ? data.keptCards : [];
      favoriteCards = Array.isArray(data.favoriteCards) ? data.favoriteCards : [];
    } catch {
      collectionCount.textContent = "Owned: 0";
      favoritesGrid.innerHTML = `<div class="empty-collection">Failed to load favorites.</div>`;
      ownedGrid.innerHTML = `<div class="empty-collection">Failed to load collection.</div>`;
      return;
    }

    const favoriteOwnedCards = keptCards.filter((card) =>
      favoriteCards.includes(getCardId(card))
    );

    const nonFavoriteOwnedCards = keptCards.filter((card) =>
      !favoriteCards.includes(getCardId(card))
    );

    collectionCount.textContent = `Owned: ${nonFavoriteOwnedCards.length}`;

    favoritesGrid.innerHTML = "";
    ownedGrid.innerHTML = "";

    if (favoriteOwnedCards.length === 0) {
      favoritesGrid.innerHTML = `<div class="empty-collection">No favorite cards yet.</div>`;
    } else {
      favoriteOwnedCards.forEach((card) => {
        favoritesGrid.appendChild(createCardElement(card, true));
      });
    }

    if (nonFavoriteOwnedCards.length === 0) {
      ownedGrid.innerHTML = `<div class="empty-collection">No owned cards yet.</div>`;
    } else {
      nonFavoriteOwnedCards.forEach((card) => {
        ownedGrid.appendChild(createCardElement(card, false));
      });
    }
  }

  renderCollection();
</script>
</body>
</html>
